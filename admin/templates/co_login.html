<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Панель управления ботом</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-900 via-teal-900 to-slate-900 flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <div class="bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-8 shadow-2xl">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-600 shadow-lg mb-4">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">WhatsApp Bot</h1>
        <p class="text-slate-400 text-sm mt-1">Войдите в панель управления</p>
      </div>

      {% if error %}
      <div class="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm text-center">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/portal/login">
        <div class="mb-4">
          <label class="block text-slate-300 text-sm font-medium mb-2">Логин</label>
          <input type="text" name="login" autofocus required
                 class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition"
                 placeholder="Ваш логин">
        </div>
        <div class="mb-6">
          <label class="block text-slate-300 text-sm font-medium mb-2">Пароль</label>
          <input type="password" name="password" required
                 class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition"
                 placeholder="Ваш пароль">
        </div>
        <button type="submit"
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-semibold py-3 rounded-xl transition-all shadow-lg hover:shadow-emerald-500/25">
          Войти
        </button>
      </form>
    </div>
  </div>
</body>
</html>
