<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Супер-Админ — Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <div class="bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-8 shadow-2xl">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-500 to-purple-700 shadow-lg mb-4">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Панель администратора</h1>
        <p class="text-slate-400 text-sm mt-1">Управление всеми компаниями</p>
      </div>

      {% if error %}
      <div class="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm text-center">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/admin/login">
        <div class="mb-4">
          <label class="block text-slate-300 text-sm font-medium mb-2">Мастер-пароль</label>
          <input type="password" name="password" autofocus required
                 class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-violet-400 focus:ring-1 focus:ring-violet-400 transition"
                 placeholder="Введите пароль">
        </div>
        <button type="submit"
                class="w-full bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 text-white font-semibold py-3 rounded-xl transition-all shadow-lg hover:shadow-violet-500/25">
          Войти
        </button>
      </form>

      <div class="mt-6 pt-4 border-t border-white/10 text-center">
        <a href="/portal/login" class="text-slate-400 hover:text-violet-300 text-sm transition">
          Войти как владелец бизнеса →
        </a>
      </div>
    </div>
  </div>
</body>
</html>
